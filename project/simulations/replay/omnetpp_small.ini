*.manager.launchConfig = xmldoc("arcavacatamap_small_50pct.launchd.xml")
*.manager.moduleType = "normal_car=networkprojectvanet.replay.replay_mitigation_ecdsa.map_table.EcdsaAodvCar slow_car=networkprojectvanet.replay.replay_mitigation_ecdsa.map_table.EcdsaAodvCar attacker_car=networkprojectvanet.replay.replay_attack.AttackerAodvReplayCar"
*.manager.moduleName = "normal_car=normal_car slow_car=normal_car attacker_car=attacker_car"
*.manager.moduleDisplayString = "normal_car='i=veins/node/car;is=vs' attacker_car='i=veins/node/car,red;is=vs'"
*.normal_car[*].routing.ecdsaPubKeyMapJson = "/home/giada/NetworkProjectVanet/src/replay/replay_mitigation_ecdsa/keys/pubkeys_ecdsa.json"
*.normal_car[*].routing.freshnessWindow = 2s
*.normal_car[*].routing.entryTimeout = 30s
*.normal_car[*].routing.gcInterval = 10s
*.normal_car[*].routing.maxCacheSize = 1000
**.routing.debug = false
*.normal_car[*].routing.attackerNodeIds = "node4 node5 node6 node7 node11 node12 node13 node15 node17 node18 node21 node22 node24"


