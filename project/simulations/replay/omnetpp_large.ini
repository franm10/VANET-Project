[General]
network = networkprojectvanet.simulations.replay.Scenario

cmdenv-express-mode = true
cmdenv-status-frequency = 0s

sim-time-limit = 300s
warmup-period = 10s
repeat = 50
seed-set = ${repetition}

# ARP
*.*_car[*].ipv4.arp.typename = "Arp"

# Forwarding
*.normal_car[*].ipv4.ip.forwarding = true
*.normal_car[*].ipv4.ip.procDelay = 0s
*.attacker_car[*].ipv4.ip.forwarding = true
*.attacker_car[*].ipv4.ip.procDelay = 0s

# Routing table
*.normal_car[*].ipv4.routingTable.routingFile = ""
*.normal_car[*].ipv4.routingTable.netmaskRoutes = ""
*.normal_car[*].ipv4.configurator.addDefaultRoutes = false
*.normal_car[*].ipv4.configurator.addStaticRoutes = false
*.normal_car[*].ipv4.configurator.addSubnetRoutes = false
*.attacker_car[*].ipv4.routingTable.routingFile = ""
*.attacker_car[*].ipv4.routingTable.netmaskRoutes = ""
*.attacker_car[*].ipv4.configurator.addDefaultRoutes = false
*.attacker_car[*].ipv4.configurator.addStaticRoutes = false
*.attacker_car[*].ipv4.configurator.addSubnetRoutes = false

# AODV settings nodi normali
*.normal_car[*].routing.useHelloMessages = true
*.normal_car[*].routing.maxQueuedPackets = 3
*.normal_car[*].routing.maxQueueTime = 60s
*.normal_car[*].routing.activeRouteTimeout = 10s
*.normal_car[*].routing.helloInterval = 2s
*.normal_car[*].routing.allowedHelloLoss = 2
*.normal_car[*].routing.netDiameter = 35
*.normal_car[*].routing.rreqRetries = 2
*.normal_car[*].routing.rreqRatelimit = 3
*.normal_car[*].routing.destinationOnlyFlag = false
*.normal_car[*].routing.deletePeriod = 5s
*.normal_car[*].routing.ttlStart = 2
*.normal_car[*].routing.ttlIncrement = 2
*.normal_car[*].routing.ttlThreshold = 7

# AODV settings attaccanti
*.attacker_car[*].routing.useHelloMessages = true
*.attacker_car[*].routing.maxQueuedPackets = 3
*.attacker_car[*].routing.maxQueueTime = 60s
*.attacker_car[*].routing.activeRouteTimeout = 10s
*.attacker_car[*].routing.helloInterval = 2s
*.attacker_car[*].routing.allowedHelloLoss = 2
*.attacker_car[*].routing.netDiameter = 35
*.attacker_car[*].routing.rreqRetries = 2
*.attacker_car[*].routing.rreqRatelimit = 3
*.attacker_car[*].routing.destinationOnlyFlag = false
*.attacker_car[*].routing.deletePeriod = 5s

# Radio
*.*_car[*].wlan[*].typename = "AckingWirelessInterface"
*.*_car[*].wlan[*].bitrate = 2Mbps
*.*_car[*].wlan[*].mac.headerLength = 23B
*.*_car[*].wlan[*].radio.typename = "UnitDiskRadio"
*.*_car[*].wlan[*].radio.transmitter.headerLength = 96b
*.*_car[*].wlan[*].radio.transmitter.communicationRange = 250m
*.*_car[*].wlan[*].radio.transmitter.interferenceRange = 0m
*.*_car[*].wlan[*].radio.transmitter.detectionRange = 0m
*.*_car[*].wlan[*].radio.receiver.ignoreInterference = true

# IP Configurator
*.*_car[*].ipv4.configurator.typename = "HostAutoConfigurator"
*.*_car[*].ipv4.configurator.interfaces = "wlan0"
*.*_car[*].ipv4.configurator.mcastGroups = "224.0.0.1"

# ============================================
# STATISTICHE
# ============================================
**.vector-recording = false
**.scalar-recording = true
**.wlan[*].*.scalar-recording = false
**.radioMedium.*.scalar-recording = false
**.mobility.*.scalar-recording = false

*.normal_car[*].app[*].scalar-recording = true
*.attacker_car[*].app[*].scalar-recording = true

**.trustManager.scalar-recording = true
**.trustManager.detectionTP.result-recording-modes = +count
**.trustManager.detectionFP.result-recording-modes = +count
**.trustManager.detectionFN.result-recording-modes = +count
**.trustManager.detectionTN.result-recording-modes = +count

# Mobility
*.*_car[*].mobility.typename = "VeinsInetMobility"
*.manager.updateInterval = 0.1s

# ============================================
# APPLICAZIONI UDP — stesse coppie del grayhole large
# ============================================

*.normal_car[44].numApps = 1
*.normal_car[44].app[0].typename = "UdpBasicApp"
*.normal_car[44].app[0].destAddresses = "normal_car[25]"
*.normal_car[44].app[0].localPort = 5000
*.normal_car[44].app[0].destPort = 5000
*.normal_car[44].app[0].messageLength = 512B
*.normal_car[44].app[0].sendInterval = 0.25s
*.normal_car[44].app[0].startTime = 185s
*.normal_car[44].app[0].packetName = "UDPData"

*.normal_car[26].numApps = 1
*.normal_car[26].app[0].typename = "UdpBasicApp"
*.normal_car[26].app[0].destAddresses = "normal_car[24]"
*.normal_car[26].app[0].localPort = 5000
*.normal_car[26].app[0].destPort = 5000
*.normal_car[26].app[0].messageLength = 512B
*.normal_car[26].app[0].sendInterval = 0.25s
