*.normal_car[26].app[0].packetName = "UDPData"

*.normal_car[39].numApps = 1
*.normal_car[39].app[0].typename = "UdpBasicApp"
*.normal_car[39].app[0].destAddresses = "normal_car[32]"
*.normal_car[39].app[0].localPort = 5000
*.normal_car[39].app[0].destPort = 5000
*.normal_car[39].app[0].messageLength = 512B
*.normal_car[39].app[0].sendInterval = 0.25s
*.normal_car[39].app[0].startTime = 145s
*.normal_car[39].app[0].packetName = "UDPData"

*.normal_car[45].numApps = 1
*.normal_car[45].app[0].typename = "UdpBasicApp"
*.normal_car[45].app[0].destAddresses = "normal_car[40]"
*.normal_car[45].app[0].localPort = 5000
*.normal_car[45].app[0].destPort = 5000
*.normal_car[45].app[0].messageLength = 512B
*.normal_car[45].app[0].sendInterval = 0.25s
*.normal_car[45].app[0].startTime = 190s
*.normal_car[45].app[0].packetName = "UDPData"

*.normal_car[67].numApps = 1
*.normal_car[67].app[0].typename = "UdpBasicApp"
*.normal_car[67].app[0].destAddresses = "normal_car[42]"
*.normal_car[67].app[0].localPort = 5000
*.normal_car[67].app[0].destPort = 5000
*.normal_car[67].app[0].messageLength = 512B
*.normal_car[67].app[0].sendInterval = 0.25s
*.normal_car[67].app[0].startTime = 250s
*.normal_car[67].app[0].packetName = "UDPData"

*.normal_car[63].numApps = 1
*.normal_car[63].app[0].typename = "UdpBasicApp"
*.normal_car[63].app[0].destAddresses = "normal_car[44]"
*.normal_car[63].app[0].localPort = 5000
*.normal_car[63].app[0].destPort = 5000
*.normal_car[63].app[0].messageLength = 512B
*.normal_car[63].app[0].sendInterval = 0.25s
*.normal_car[63].app[0].startTime = 230s
*.normal_car[63].app[0].packetName = "UDPData"

# Default: tutti gli altri sono sink
*.normal_car[*].numApps = 1
*.normal_car[*].app[0].typename = "UdpSink"
*.normal_car[*].app[0].localPort = 5000

*.attacker_car[*].numApps = 1
*.attacker_car[*].app[0].typename = "UdpSink"
*.attacker_car[*].app[0].localPort = 5000

# ============================================================
# PARAMETRI ATTACCANTE
# ============================================================
*.attacker_car[*].routing.replayStart = 9.90s
*.attacker_car[*].routing.replayLatency = 0.2s
*.attacker_car[*].routing.bufferWindow = 3s
*.attacker_car[*].routing.targetIpv4 = -1
*.attacker_car[*].routing.enableForgery = true
*.attacker_car[*].routing.enablePureReplay = true
*.attacker_car[*].routing.pureReplayDelay = 0.1s
*.attacker_car[*].routing.blacklistTimeout = 0s

# ============================================================
# RACCOLTA STATISTICHE
# ============================================================
**.scalar-recording = true
**.vector-recording = false

*.normal_car[*].app[*].scalar-recording = true
*.attacker_car[*].app[*].scalar-recording = true

*.normal_car[*].app[*].endToEndDelay:mean.result-recording-modes = +mean
*.normal_car[*].app[*].endToEndDelay:vector.vector-recording = true

**.wlan[*].*.scalar-recording = false
**.radioMedium.*.scalar-recording = false
**.mobility.*.scalar-recording = false
**.routing.*.scalar-recording = true

# ============================================
# VISUALIZATION
# ============================================
*.visualizer.networkRouteVisualizer.displayRoutes = true
*.*_car[*].wlan[0].radio.displayCommunicationRange = true

