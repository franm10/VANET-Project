[General]
network = networkprojectvanet.simulations.grayhole.Scenario

# ============================================
# LOG
# ============================================
#**.cmdenv-log-level = off
cmdenv-express-mode = true
#cmdenv-express-mode = false
##cmdenv-output-file = results/debug_log.txt
cmdenv-status-frequency = 0s
#*.attacker_car[*].routing.cmdenv-log-level = warn

# ============================================
# CONFIGURAZIONE RETE
# ============================================
sim-time-limit = 300s
warmup-period = 10s
repeat = 50
seed-set = ${repetition}

*.*_car[*].ipv4.arp.typename = "Arp"

*.attacker_car[*].trustManager.enableDistributedTrust = false

# ============================================
# CRITICAL: IP E ROUTING CONFIGURATION
# ============================================
*.normal_car[*].ipv4.ip.forwarding = true
*.normal_car[*].ipv4.ip.procDelay = 0s
*.attacker_car[*].ipv4.ip.forwarding = true
*.attacker_car[*].ipv4.ip.procDelay = 0s

# ============================================
# CRITICAL: Disabilita rotte automatiche
# ============================================
*.normal_car[*].ipv4.routingTable.routingFile = ""
*.normal_car[*].ipv4.routingTable.netmaskRoutes = ""
*.normal_car[*].ipv4.configurator.addDefaultRoutes = false
*.normal_car[*].ipv4.configurator.addStaticRoutes = false
*.normal_car[*].ipv4.configurator.addSubnetRoutes = false

*.attacker_car[*].ipv4.routingTable.routingFile = ""
*.attacker_car[*].ipv4.routingTable.netmaskRoutes = ""
*.attacker_car[*].ipv4.configurator.addDefaultRoutes = false
*.attacker_car[*].ipv4.configurator.addStaticRoutes = false
*.attacker_car[*].ipv4.configurator.addSubnetRoutes = false

# ============================================
# CRITICAL: AODV CONFIGURATION  valori ridotti
# ============================================
*.normal_car[*].routing.useHelloMessages = true
*.normal_car[*].routing.maxQueuedPackets = 100
*.normal_car[*].routing.maxQueueTime = 60s
*.normal_car[*].routing.activeRouteTimeout = 5s
*.normal_car[*].routing.helloInterval = 2s
*.normal_car[*].routing.allowedHelloLoss = 3
*.normal_car[*].routing.netDiameter = 35
*.normal_car[*].routing.rreqRetries = 2
*.normal_car[*].routing.rreqRatelimit = 10
*.normal_car[*].routing.destinationOnlyFlag = false


*.normal_car[*].routing.warmupPacketLimit = 15    # era 30
*.attacker_car[*].routing.warmupPacketLimit = 15

*.attacker_car[*].routing.useHelloMessages = true
*.attacker_car[*].routing.maxQueuedPackets = 20
*.attacker_car[*].routing.maxQueueTime = 60s
*.attacker_car[*].routing.activeRouteTimeout = 5s
*.attacker_car[*].routing.helloInterval = 2s
*.attacker_car[*].routing.allowedHelloLoss = 3
*.attacker_car[*].routing.netDiameter = 35
*.attacker_car[*].routing.rreqRetries = 2
*.attacker_car[*].routing.rreqRatelimit = 10
*.attacker_car[*].routing.destinationOnlyFlag = false

# ============================================
# TRUST MANAGER PARAMETERS
# ============================================
*.normal_car[*].trustManager.trustThreshold = 0.5
*.normal_car[*].trustManager.initialTrust = 1.0

*.normal_car[*].trustManager.enableDistributedTrust = true
*.attacker_car[*].trustManager.enableDistributedTrust = true
*.attacker_car[*].trustManager.trustThreshold = 1


# TrustMonitor
*.normal_car[*].trustMonitor.forwardingWindowDuration = 5s
*.normal_car[*].trustMonitor.hopCountTimeout = 4s
*.normal_car[*].trustMonitor.warmupDuration = 10.0

# ============================================
# WIRELESS INTERFACE
# ============================================
*.*_car[*].wlan[*].typename = "WirelessInterface"
*.*_car[*].wlan[*].mac.typename = "CsmaCaMac"
*.*_car[*].wlan[*].mac.useAck = false
*.*_car[*].wlan[*].mac.headerLength = 23B
*.*_car[*].wlan[*].mac.bitrate = 2Mbps
*.*_car[*].wlan[*].radio.transmitter.bitrate = 2Mbps
*.*_car[*].wlan[*].radio.typename = "UnitDiskRadio"
*.*_car[*].wlan[*].radio.transmitter.headerLength = 96b
*.*_car[*].wlan[*].radio.transmitter.communicationRange = 400m
*.*_car[*].wlan[*].radio.transmitter.interferenceRange = 0m
*.*_car[*].wlan[*].radio.transmitter.detectionRange = 0m
*.*_car[*].wlan[*].radio.receiver.ignoreInterference = true

# ============================================
# HOST AUTO CONFIGURATOR
# ============================================
*.*_car[*].ipv4.configurator.typename = "HostAutoConfigurator"
*.*_car[*].ipv4.configurator.interfaces = "wlan0"
*.*_car[*].ipv4.configurator.mcastGroups = "224.0.0.1"

# ============================================
# APPLICAZIONI UDP  default: tutti ascoltano
# Le coppie mittente/destinatario sono definite
# nei singoli [Config] per ogni scenario.
# ============================================
*.normal_car[*].numApps = 1
*.normal_car[*].app[0].typename = "UdpSink"
*.normal_car[*].app[0].localPort = 5000
*.normal_car[*].routing.deletePeriod = 5s

*.attacker_car[*].numApps = 1
*.attacker_car[*].app[0].typename = "UdpSink"
*.attacker_car[*].app[0].localPort = 5000
*.attacker_car[*].routing.deletePeriod = 5s

# ============================================
# MOBILITY
# ============================================
*.*_car[*].mobility.typename = "VeinsInetMobility"

# ============================================
# VEINS INET MANAGER
# ============================================
*.manager.updateInterval = 0.1s

# ============================================
# VISUALIZATION
# ============================================
*.visualizer.networkRouteVisualizer.displayRoutes = true
*.*_car[*].wlan[0].radio.displayCommunicationRange = true

# ============================================
# STATISTICHE
# ============================================
**.vector-recording = false
**.scalar-recording = true
**.wlan[*].*.scalar-recording = false
**.radioMedium.*.scalar-recording = false
**.mobility.*.scalar-recording = false


# Opzionale: se usi i vettori per i grafici nel tempo
*.normal_car[*].app[*].vector-recording = true

*.normal_car[*].app[*].scalar-recording = true
*.attacker_car[*].app[*].scalar-recording = true

**.trustManager.detectionTP.result-recording-modes = +sum
**.trustManager.detectionFP.result-recording-modes = +sum
**.trustManager.detectionFN.result-recording-modes = +sum
**.trustManager.detectionTN.result-recording-modes = +sum

**.mitigationManager.blacklistTP.result-recording-modes = +sum
**.mitigationManager.blacklistFP.result-recording-modes = +sum
**.mitigationManager.blacklistFN.result-recording-modes = +sum

# noattack: 25 normali, 24 sorgenti, 47 flussi
# 8pct: 23 normali, 22 sorgenti, 43 flussi
# 15pct: 21 normali, 20 sorgenti, 39 flussi
# 30pct: 18 normali, 17 sorgenti, 33 flussi
# 40pct: 15 normali, 14 sorgenti, 27 flussi
# 50pct: 12 normali, 11 sorgenti, 21 flussi
# 60pct: 10 normali, 9 sorgenti, 17 flussi
