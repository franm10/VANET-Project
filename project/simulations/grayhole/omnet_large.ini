[General]
network = networkprojectvanet.simulations.grayhole.Scenario

# ============================================
# LOG
# ============================================
#**.cmdenv-log-level = off
cmdenv-express-mode = true
#cmdenv-express-mode = false
##cmdenv-output-file = results/debug_log.txt
cmdenv-status-frequency = 0s
#*.attacker_car[*].routing.cmdenv-log-level = warn


# ============================================
# CONFIGURAZIONE RETE
# ============================================
sim-time-limit = 300s
warmup-period = 10s
repeat = 50
seed-set = ${repetition}

*.*_car[*].ipv4.arp.typename = "Arp"


*.attacker_car[*].trustManager.enableDistributedTrust = false

# Warmup TrustMonitor (per calcolo throughput, allineato a warmup-period)
*.normal_car[*].trustMonitor.warmupDuration = 10.0

# Warmup pacchetti per fase trust attiva
*.normal_car[*].routing.warmupPacketLimit = 30
*.attacker_car[*].routing.warmupPacketLimit = 30

*.normal_car[*].ipv4.ip.forwarding = true
*.normal_car[*].ipv4.ip.procDelay = 0s
*.attacker_car[*].ipv4.ip.forwarding = true
*.attacker_car[*].ipv4.ip.procDelay = 0s

*.*_car[*].wlan[*].radio.transmitter.communicationRange = 350m

# CRITICAL: Devi aumentare ancora le code e diminuire la frequenza dei messaggi HELLO
# per evitare che le auto si zittiscano a vicenda per troppe collisioni
*.normal_car[*].routing.maxQueuedPackets = 100
*.normal_car[*].routing.rreqRatelimit = 40
*.normal_car[*].routing.helloInterval = 3s   # Alza a 3 secondi (riduce l'overhead dei beacon)

*.normal_car[*].ipv4.routingTable.routingFile = ""
*.normal_car[*].ipv4.routingTable.netmaskRoutes = ""
*.normal_car[*].ipv4.configurator.addDefaultRoutes = false
*.normal_car[*].ipv4.configurator.addStaticRoutes = false
*.normal_car[*].ipv4.configurator.addSubnetRoutes = false

*.attacker_car[*].ipv4.routingTable.routingFile = ""
*.attacker_car[*].ipv4.routingTable.netmaskRoutes = ""
*.attacker_car[*].ipv4.configurator.addDefaultRoutes = false
*.attacker_car[*].ipv4.configurator.addStaticRoutes = false
*.attacker_car[*].ipv4.configurator.addSubnetRoutes = false

*.normal_car[*].routing.useHelloMessages = true
#*.normal_car[*].routing.maxQueuedPackets = 60
*.normal_car[*].routing.maxQueueTime = 60s
*.normal_car[*].routing.activeRouteTimeout = 5s
#*.normal_car[*].routing.helloInterval = 2s
*.normal_car[*].routing.allowedHelloLoss = 3
*.normal_car[*].routing.netDiameter = 35
*.normal_car[*].routing.rreqRetries = 2
#*.normal_car[*].routing.rreqRatelimit = 30
*.normal_car[*].routing.destinationOnlyFlag = false

*.attacker_car[*].routing.useHelloMessages = true
*.attacker_car[*].routing.maxQueuedPackets = 3
*.attacker_car[*].routing.maxQueueTime = 60s
*.attacker_car[*].routing.activeRouteTimeout = 5s
*.attacker_car[*].routing.helloInterval = 2s
*.attacker_car[*].routing.allowedHelloLoss = 3
*.attacker_car[*].routing.netDiameter = 35
*.attacker_car[*].routing.rreqRetries = 2
*.attacker_car[*].routing.rreqRatelimit = 3
*.attacker_car[*].routing.destinationOnlyFlag = false

# TrustManager
*.normal_car[*].trustManager.trustThreshold = 0.5
*.normal_car[*].trustManager.initialTrust = 0.7
*.normal_car[*].trustManager.decayRate = 0.01
*.normal_car[*].trustManager.w1 = 0.3
*.normal_car[*].trustManager.w2 = 0.5
*.normal_car[*].trustManager.w3 = 0.2
*.attacker_car[*].trustManager.trustThreshold = 0.1
*.attacker_car[*].trustManager.decayRate = 0.01

# TrustMonitor
*.normal_car[*].trustMonitor.forwardingWindowDuration = 5s
*.normal_car[*].trustMonitor.hopCountTimeout = 4s

*.normal_car[*].mitigationManager.forwardingWindowDuration = 10s
*.normal_car[*].mitigationManager.minWindowFactor = 0.5
*.normal_car[*].mitigationManager.maxWindowFactor = 5.0
*.normal_car[*].mitigationManager.minTopologyScaling = 0.1
*.normal_car[*].mitigationManager.maxTopologyScaling = 0.15
*.normal_car[*].mitigationManager.absoluteMinInterval = 5s
*.normal_car[*].mitigationManager.absoluteMaxInterval = 30s
*.normal_car[*].mitigationManager.baseEvaluationInterval = 8s
*.normal_car[*].mitigationManager.topologyScaling = 0.15
*.normal_car[*].mitigationManager.stabilityScaling = 0.4
*.normal_car[*].mitigationManager.interactionScaling = 0.3
*.normal_car[*].mitigationManager.outlierSensitivity = 1.5
*.normal_car[*].mitigationManager.minSampleSize = 5
*.normal_car[*].mitigationManager.baseBlacklistStrikes = 3
*.normal_car[*].mitigationManager.strikesScaling = 0.05
*.normal_car[*].mitigationManager.maxBlacklistStrikes = 8
*.normal_car[*].mitigationManager.maxHistorySize = 5
# Riabilitazione
*.normal_car[*].mitigationManager.rehabilitationThreshold = 0.6
*.normal_car[*].mitigationManager.rehabilitationStrikes = 5
*.normal_car[*].mitigationManager.maxRehabilitationStrikes = 10
*.normal_car[*].mitigationManager.rehabilitationScaling = 0.05



*.*_car[*].wlan[*].typename = "AckingWirelessInterface"
*.*_car[*].wlan[*].bitrate = 2Mbps
*.*_car[*].wlan[*].mac.headerLength = 23B
*.*_car[*].wlan[*].radio.typename = "UnitDiskRadio"
*.*_car[*].wlan[*].radio.transmitter.headerLength = 96b
#*.*_car[*].wlan[*].radio.transmitter.communicationRange = 350m
*.*_car[*].wlan[*].radio.transmitter.interferenceRange = 0m
*.*_car[*].wlan[*].radio.transmitter.detectionRange = 0m
*.*_car[*].wlan[*].radio.receiver.ignoreInterference = true

*.*_car[*].ipv4.configurator.typename = "HostAutoConfigurator"
*.*_car[*].ipv4.configurator.interfaces = "wlan0"
*.*_car[*].ipv4.configurator.mcastGroups = "224.0.0.1"

# ============================================
# APPLICAZIONI UDP — 8 coppie sorgente-dest
# ============================================

